name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jarvis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            orchestrator/dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('orchestrator/orchestrator.cabal', 'orchestrator/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Map 'db' hostname to localhost
        run: echo "127.0.0.1 db" | sudo tee -a /etc/hosts

      - name: Build and test
        run: ./build.sh
