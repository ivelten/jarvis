name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "latest"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            orchestrator/dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('orchestrator/orchestrator.cabal', 'orchestrator/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Build and test
        run: ./build.sh
